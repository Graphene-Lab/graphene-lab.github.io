faq:
  title: "FAQ"
  subtitle: "Короткие ответы о безопасности, доступе и хостинге Cloud Space."
  q1: "Вы можете получить доступ к моим файлам?"
  a1: "Нет. Client-Side Encryption и отсутствие доступа провайдера к ключам гарантируют, что расшифровку контролируете только вы."
  q2: "Вы можете восстановить утерянные ключи?"
  a2: "Нет. Мы не храним ключи."
  q3: "Вы сканируете файлы пользователей?"
  a3: "Нет. Provider-Blind Storage означает, что сервер никогда не видит контент в открытом виде."
  q4: "Graphene Cloud self-hosted?"
  a4: "Нет, Graphene Cloud размещен на наших серверах с защитой Zero-Trust."
  q5: "Могу ли я развернуть у себя?"
  a5: "Да, через Private Home Cloud на выделенных cloud-боксах."
  q6: "Бесплатный план постоянный?"
  a6: "Это предложение Early Access Beta с ограничением емкости."
