  card_zero_title: "Шифрование Zero-Knowledge и архитектура Zero-Trust"
  card_zero_intro: "Все шифрование выполняется на стороне клиента до загрузки. Мы не получаем вашу passphrase или master key."
  card_zero_detail_1: "Имена файлов обфусцируются, а для каждого файла используется отдельный детерминированно выводимый ключ."
  card_zero_detail_2: "Ни один внешний компонент не считается доверенным. Прокси передают только зашифрованный трафик."
  card_zero_detail_3: "Air-gapped cold storage может дополнительно снизить риск удаленных атак."
  card_zero_detail_4: "Мы также используем энергоэффективную ARM-инфраструктуру, снижая потребление без потери производительности."
  card_fast_title: "Высокая производительность"
  card_fast_desc: "Оптимизированная синхронизация и низкая задержка на всех устройствах."
  card_linux_title: "Поддержка Linux"
  card_linux_desc: "Первый провайдер с бесплатным пространством для Linux, а также клиенты для Windows, iOS и Android."
  card_free_title: "100 ГБ бесплатно (ограниченное предложение)"
  card_free_desc: "Early Access Beta включает 100 ГБ бесплатно. Без банковской карты. Предложение ограничено емкостью."
security:
  eyebrow: "Privacy-First"
  title: "Ключевые особенности безопасности и архитектуры"
  subtitle: "Безопасность встроена с первого байта: zero-knowledge, шифрование на стороне клиента и архитектура, слепая для провайдера."
  card_1_title: "Client-Side Encryption"
  card_1_desc: "Ваши файлы шифруются на устройстве до начала любой загрузки."
  card_2_title: "Нет доступа провайдера к ключам"
  card_2_desc: "Мы не получаем, не храним и не восстанавливаем ключи."
  card_3_title: "Обфускация метаданных"
  card_3_desc: "Зашифрованные имена и минимизация метаданных уменьшают видимость паттернов использования."
  card_4_title: "Архитектура Zero-Trust"
  card_4_desc: "Ни одна сторона не считается доверенной по умолчанию."
  card_5_title: "Quantum-Resistant"
  card_5_desc: "Симметричная и hash-based деривация с 512-bit материалом повышает долгосрочную устойчивость."
  card_6_title: "Air-Gapped Cold Storage"
  card_6_desc: "Изолированное хранилище может оставаться вне прямых путей удаленной атаки."
  card_7_title: "Энергоэффективная инфраструктура"
  card_7_desc: "ARM-инфраструктура снижает энергопотребление, сохраняя высокую производительность."
  card_8_title: "Дизайн, устойчивый к слежке"
  card_8_desc: "Provider-blind storage уменьшает воздействие внешнего мониторинга."
