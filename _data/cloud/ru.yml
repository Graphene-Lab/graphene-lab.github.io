why:
  title: "Почему Graphene Cloud?"
  subtitle: "Мы переосмыслили хранилище с нуля, чтобы поставить вашу приватность на первое место."
  philosophy: "Наша философия: ПО, заявляющее о высокой безопасности, должно быть open source, чтобы любой мог проверить реализацию."
