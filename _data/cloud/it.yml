faq:
  title: "FAQ"
  subtitle: "Risposte rapide su sicurezza, accesso e hosting Cloud Space."
  q1: "Potete accedere ai miei file?"
  a1: "No. Client-Side Encryption e assenza di accesso provider alle chiavi garantiscono che solo tu controlli la decifratura."
  q2: "Potete recuperare chiavi perse?"
  a2: "No. Non memorizziamo chiavi."
  q3: "Scansionate i file utenti?"
  a3: "No. Provider-Blind Storage significa che il server non vede mai contenuto in chiaro."
  q4: "Graphene Cloud e self-hosted?"
  a4: "No, Graphene Cloud e ospitato sui nostri server con protezioni Zero-Trust."
  q5: "Posso fare self-hosting?"
  a5: "Si, tramite Private Home Cloud su box cloud dedicati."
  q6: "Il piano gratuito e permanente?"
  a6: "E un'offerta Early Access Beta con limite di capacita."
