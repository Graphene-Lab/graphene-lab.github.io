why:
  title: "Perche scegliere Graphene Cloud?"
  subtitle: "Abbiamo ripensato lo storage da zero per dare priorita alla tua privacy."
  philosophy: "La nostra filosofia: software che promette sicurezza forte deve essere open source, cosi chiunque puo verificarlo."
  source_cta: "Guarda il nostro codice sorgente"
  read_more: "Leggi di piu"
  read_less: "Leggi meno"
  card_zero_title: "Cifratura Zero-Knowledge e architettura Zero-Trust"
  card_zero_intro: "Tutta la cifratura avviene lato client prima dell'upload. Non riceviamo passphrase o chiave master."
  card_zero_detail_1: "I nomi file sono offuscati e ogni file usa una chiave dedicata derivata in modo deterministico."
  card_zero_detail_2: "Nessun componente esterno e considerato fidato. I proxy inoltrano solo traffico cifrato."
  card_zero_detail_3: "Lo storage air-gapped puo ridurre ulteriormente il rischio di attacchi remoti."
  card_zero_detail_4: "Usiamo anche infrastruttura ARM efficiente per ridurre consumi senza perdere prestazioni."
  card_fast_title: "Prestazioni elevate"
  card_fast_desc: "Sincronizzazione ottimizzata e bassa latenza su tutti i dispositivi."
  card_linux_title: "Supporto Linux"
  card_linux_desc: "Primo provider con spazio gratuito per Linux, oltre a client Windows, iOS e Android."
  card_free_title: "100 GB gratis (offerta limitata)"
  card_free_desc: "Early Access Beta include 100 GB gratis. Nessuna carta di credito richiesta. Offerta limitata dalla capacita."
security:
  eyebrow: "Privacy-First"
  title: "Punti chiave di sicurezza e architettura"
  subtitle: "La sicurezza e integrata dal primo byte con zero-knowledge, cifratura lato client e architettura blind per il provider."
  card_1_title: "Client-Side Encryption"
  card_1_desc: "I tuoi file vengono cifrati sul dispositivo prima di qualsiasi upload."
  card_2_title: "Nessun accesso provider alle chiavi"
  card_2_desc: "Non riceviamo, archiviamo o recuperiamo chiavi."
  card_3_title: "Offuscamento metadati"
  card_3_desc: "Nomi file cifrati e metadati minimizzati riducono la visibilita d'uso."
  card_4_title: "Architettura Zero-Trust"
  card_4_desc: "Nessuna parte e considerata affidabile per default."
  card_5_title: "Quantum-Resistant"
  card_5_desc: "Derivazione simmetrica e hash a 512 bit migliora la resilienza a lungo termine."
  card_6_title: "Air-Gapped Cold Storage"
  card_6_desc: "Lo storage isolato puo restare fuori dai percorsi di attacco remoto diretto."
  card_7_title: "Infrastruttura efficiente"
  card_7_desc: "Infrastruttura ARM per ridurre consumi mantenendo alte prestazioni."
  card_8_title: "Design resistente alla sorveglianza"
  card_8_desc: "Lo storage blind per il provider riduce esposizione al monitoraggio esterno."
