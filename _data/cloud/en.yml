faq:
  title: "FAQ"
  subtitle: "Quick answers about security, access, and Cloud Space hosting."
  q1: "Can you access my files?"
  a1: "No. Client-Side Encryption and no provider key access ensure only you control decryption keys."
  q2: "Can you recover lost encryption keys?"
  a2: "No. We do not store keys, so lost credentials cannot be recovered by the provider."
  q3: "Do you scan user files?"
  a3: "No. Provider-Blind Storage means the server never sees plaintext content."
  q4: "Is Graphene Cloud self-hosted?"
  a4: "No, Graphene Cloud is hosted on our servers with Zero-Trust safeguards."
  q5: "Can I self-host?"
  a5: "Yes, via the Private Home Cloud product for optional storage on dedicated cloud boxes."
  q6: "Is the free plan permanent?"
  a6: "It is an Early Access Beta offer. Users keep 100 GB free while the service operates, but the offer is capacity-limited."
