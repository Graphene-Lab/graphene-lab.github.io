why:
  title: "Why Choose Graphene Cloud?"
  subtitle: "We've reimagined storage from the ground up to prioritize your privacy."
  philosophy: "Our philosophy is simple: software claiming strong security must be open source so anyone can verify the implementation."
  source_cta: "View Our Source Code"
  read_more: "Read more"
  read_less: "Read less"
  card_zero_title: "Zero-Knowledge Encryption & Zero-Trust Architecture"
  card_zero_intro: "All encryption is performed client-side before upload. We never receive your passphrase or master key, and we never see plaintext files."
  card_zero_detail_1: "Filenames are obfuscated and each file uses a deterministic per-file key derived from your root key and file metadata."
  card_zero_detail_2: "No external component is treated as trusted. Proxies relay encrypted traffic but cannot decrypt file content."
  card_zero_detail_3: "Air-gapped cold storage can further reduce remote attack risk, even when encrypted data is already protected."
  card_zero_detail_4: "We also use energy-efficient ARM infrastructure to reduce power usage without sacrificing performance."
  card_fast_title: "Fast performance"
  card_fast_desc: "Optimized syncing and low-latency access across devices."
  card_linux_title: "Linux Support"
  card_linux_desc: "First free-space provider with Linux support, plus Windows, iOS, and Android clients."
  card_free_title: "Free 100 GB (Limited Offer)"
  card_free_desc: "Early Access Beta includes 100 GB free storage. No credit card required. Limited capacity offer."
