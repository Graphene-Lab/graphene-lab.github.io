  card_4_title: "Zero-Trust Architecture"
  card_4_desc: "No party is treated as secure by default."
  card_5_title: "Quantum-Resistant"
  card_5_desc: "Strong symmetric and hash-based derivation with 512-bit key material improves long-term resilience."
  card_6_title: "Air-Gapped Cold Storage"
  card_6_desc: "Isolated storage can stay outside direct remote attack paths."
  card_7_title: "Energy-Efficient Infrastructure"
  card_7_desc: "ARM-based infrastructure reduces power usage while maintaining high performance."
  card_8_title: "Surveillance-Resistant Design"
  card_8_desc: "Provider-blind storage reduces exposure to external monitoring."
