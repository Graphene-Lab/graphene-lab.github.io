faq:
  title: "FAQ"
  subtitle: "Respuestas rapidas sobre seguridad, acceso y alojamiento Cloud Space."
  q1: "Pueden acceder a mis archivos?"
  a1: "No. Client-Side Encryption y sin acceso del proveedor a claves garantizan que solo tu controlas el descifrado."
  q2: "Pueden recuperar claves perdidas?"
  a2: "No. No almacenamos claves."
  q3: "Escanean archivos de usuarios?"
  a3: "No. Provider-Blind Storage significa que el servidor nunca ve contenido en texto plano."
  q4: "Graphene Cloud es self-hosted?"
  a4: "No, Graphene Cloud esta alojado en nuestros servidores con protecciones Zero-Trust."
  q5: "Puedo autoalojar?"
  a5: "Si, con Private Home Cloud en cajas cloud dedicadas."
  q6: "El plan gratis es permanente?"
  a6: "Es una oferta Early Access Beta con limite de capacidad."
