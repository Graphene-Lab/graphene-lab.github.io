security:
  eyebrow: "Privacy-First"
  title: "Aspectos destacados de seguridad y arquitectura"
  subtitle: "La seguridad esta integrada desde el primer byte con zero-knowledge, cifrado del lado del cliente y arquitectura ciega para el proveedor."
  card_1_title: "Client-Side Encryption"
  card_1_desc: "Tus archivos se cifran en tu dispositivo antes de iniciar cualquier subida."
  card_2_title: "Sin acceso del proveedor a claves"
