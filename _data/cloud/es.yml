  card_zero_title: "Cifrado Zero-Knowledge y arquitectura Zero-Trust"
  card_zero_intro: "Todo el cifrado se hace del lado del cliente antes de subir. Nunca recibimos tu passphrase ni clave maestra."
  card_zero_detail_1: "Los nombres de archivo se ofuscan y cada archivo usa una clave dedicada derivada de forma deterministica."
  card_zero_detail_2: "Ningun componente externo se considera confiable. Los proxies solo retransmiten trafico cifrado."
  card_zero_detail_3: "El almacenamiento cold air-gapped puede reducir aun mas el riesgo de ataque remoto."
  card_zero_detail_4: "Tambien usamos infraestructura ARM eficiente para reducir consumo sin perder rendimiento."
  card_fast_title: "Alto rendimiento"
  card_fast_desc: "Sincronizacion optimizada y baja latencia en todos los dispositivos."
