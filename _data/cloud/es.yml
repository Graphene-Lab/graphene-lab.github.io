  card_3_title: "Ofuscacion de metadatos"
  card_3_desc: "Nombres cifrados y metadatos minimizados reducen la visibilidad de uso."
  card_4_title: "Arquitectura Zero-Trust"
  card_4_desc: "Ninguna parte se trata como confiable por defecto."
  card_5_title: "Quantum-Resistant"
  card_5_desc: "Derivacion simetrica y basada en hash con material de 512 bits mejora la resiliencia a largo plazo."
  card_6_title: "Air-Gapped Cold Storage"
  card_6_desc: "El almacenamiento aislado puede quedar fuera de rutas directas de ataque remoto."
  card_7_title: "Infraestructura eficiente"
