faq:
  title: "FAQ"
  subtitle: "Kurze Antworten zu Sicherheit, Zugriff und Cloud-Space-Hosting."
  q1: "Koennt ihr auf meine Dateien zugreifen?"
  a1: "Nein. Client-Side Encryption und kein Provider-Schluesselzugriff stellen sicher, dass nur Sie entschluesseln koennen."
  q2: "Koennt ihr verlorene Schluessel wiederherstellen?"
  a2: "Nein. Wir speichern keine Schluessel."
  q3: "Scannt ihr Dateien?"
  a3: "Nein. Provider-Blind Storage bedeutet, dass der Server keine Klartextinhalte sieht."
  q4: "Ist Graphene Cloud self-hosted?"
  a4: "Nein, Graphene Cloud laeuft auf unseren Servern mit Zero-Trust-Schutz."
  q5: "Kann ich selbst hosten?"
  a5: "Ja, ueber Private Home Cloud auf dedizierten Cloud-Boxen."
  q6: "Ist der Gratisplan dauerhaft?"
  a6: "Es ist ein Early-Access-Beta-Angebot mit Kapazitaetsgrenze."
