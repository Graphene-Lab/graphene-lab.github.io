why:
  title: "Warum Graphene Cloud?"
  subtitle: "Wir haben Speicher von Grund auf neu gedacht, mit Fokus auf Ihre Privatsphaere."
  philosophy: "Unsere Philosophie: Software mit hohen Sicherheitsanspruechen muss Open Source sein, damit jeder die Implementierung pruefen kann."
  source_cta: "Unseren Quellcode ansehen"
  read_more: "Mehr lesen"
  read_less: "Weniger anzeigen"
  card_zero_title: "Zero-Knowledge-Verschluesselung und Zero-Trust-Architektur"
  card_zero_intro: "Alle Verschluesselung erfolgt clientseitig vor dem Upload. Wir erhalten weder Passphrase noch Master-Schluessel."
  card_zero_detail_1: "Dateinamen werden verschleiert, und jede Datei hat einen deterministisch abgeleiteten Einzelschluessel."
  card_zero_detail_2: "Keine externe Komponente gilt als vertrauenswuerdig. Proxies leiten nur verschluesselten Verkehr weiter."
  card_zero_detail_3: "Air-Gapped Cold Storage kann das Risiko entfernter Angriffe zusaetzlich reduzieren."
  card_zero_detail_4: "Wir nutzen energieeffiziente ARM-Infrastruktur, um Stromverbrauch ohne Leistungsverlust zu senken."
  card_fast_title: "Hohe Geschwindigkeit"
  card_fast_desc: "Optimierte Synchronisierung und niedrige Latenz auf allen Geraeten."
  card_linux_title: "Linux-Unterstuetzung"
  card_linux_desc: "Erster Anbieter mit kostenlosem Speicherplatz fuer Linux sowie Clients fuer Windows, iOS und Android."
  card_free_title: "100 GB kostenlos (limitiertes Angebot)"
  card_free_desc: "Early-Access-Beta mit 100 GB kostenlosem Speicher. Keine Kreditkarte erforderlich. Begrenzte Kapazitaet."
security:
  eyebrow: "Privacy-First"
  title: "Sicherheits- und Architektur-Highlights"
  subtitle: "Sicherheit ist vom ersten Byte an integriert: Zero-Knowledge, clientseitige Verschluesselung und provider-blinde Architektur."
  card_1_title: "Client-Side Encryption"
  card_1_desc: "Ihre Dateien werden auf Ihrem Geraet verschluesselt, bevor der Upload beginnt."
  card_2_title: "Kein Provider-Schluesselzugriff"
  card_2_desc: "Wir empfangen, speichern oder rekonstruieren keine Schluessel."
  card_3_title: "Metadaten-Verschleierung"
  card_3_desc: "Verschluesselte Dateinamen und reduzierte Metadaten verringern Einblicke in Nutzungsmuster."
  card_4_title: "Zero-Trust-Architektur"
  card_4_desc: "Keine Partei wird standardmaessig als vertrauenswuerdig behandelt."
  card_5_title: "Quantum-Resistant"
  card_5_desc: "Starke symmetrische und hashbasierte Ableitung mit 512-Bit-Material verbessert die langfristige Widerstandsfaehigkeit."
  card_6_title: "Air-Gapped Cold Storage"
  card_6_desc: "Isolierter Speicher kann ausserhalb direkter Remote-Angriffspfade bleiben."
  card_7_title: "Energieeffiziente Infrastruktur"
  card_7_desc: "ARM-basierte Infrastruktur reduziert Stromverbrauch bei hoher Leistung."
  card_8_title: "Ueberwachungsresistentes Design"
  card_8_desc: "Provider-blinder Speicher reduziert die Exposition gegenueber externer Ueberwachung."
