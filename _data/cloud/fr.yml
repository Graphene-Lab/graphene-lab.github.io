faq:
  title: "FAQ"
  subtitle: "Reponses rapides sur la securite, l'acces et l'hebergement Cloud Space."
  q1: "Pouvez-vous acceder a mes fichiers?"
  a1: "Non. Client-Side Encryption et absence d'acces fournisseur aux cles garantissent que vous seul controlez le dechiffrement."
  q2: "Pouvez-vous recuperer des cles perdues?"
  a2: "Non. Nous ne stockons pas les cles."
  q3: "Scannez-vous les fichiers des utilisateurs?"
  a3: "Non. Provider-Blind Storage signifie que le serveur ne voit jamais de contenu en clair."
  q4: "Graphene Cloud est-il self-hosted?"
  a4: "Non, Graphene Cloud est heberge sur nos serveurs avec protections Zero-Trust."
  q5: "Puis-je auto-heberger?"
  a5: "Oui, via Private Home Cloud sur des boitiers cloud dedies."
  q6: "Le plan gratuit est-il permanent?"
  a6: "C'est une offre Early Access Beta avec limite de capacite."
